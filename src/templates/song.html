<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mimi - $title$</title>
    $partial("src/templates/imports.html")$
</head>

<body class="song-page"
    data-hit-sound-url="$path$/audio/snare.mp3"
    data-song-url="$song-url$"
    data-song-chart-dir="$song-chart-dir$"
    data-textalive-token="$textalive-token$"
    data-textalive-beat-id="$textalive-beat-id$"
    data-textalive-chord-id="$textalive-chord-id$"
    data-textalive-repetitive-segment-id="$textalive-repetitive-segment-id$"
    data-textalive-lyric-id="$textalive-lyric-id$"
    data-textalive-lyric-diff-id="$textalive-lyric-diff-id$"
    data-song-name="$song-name$"
    data-song-name-jp="$song-name-jp$"
    data-song-author="$song-author$"
    data-song-author-jp="$song-author-jp$"
    data-song-mapper="$song-mapper$">

    <div id="loading-screen">
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loading-bar-fill"></div>
        </div>
        <span class="loading-text" data-en="Loading..." data-jp="ローディング...">Loading...</span>
        <span class="loading-hint" data-en="This is taking a while... try refreshing?" data-jp="少し時間がかかってる…　更新してみ？">This is taking a while... try refreshing?</span>
    </div>

    <div id="textalive-media"></div>
    <div class="bg-overlay"></div>
    <div class="song-storyboard" id="song-storyboard"></div>

    <div class="song-progress-bar">
        <div class="song-progress-fill" id="progress-fill"></div>
    </div>

    <div class="song-hud">
        <button class="btn-hud-toggle" id="btn-hud-toggle" aria-label="Menu" title="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
        <div class="hud-panel">
            <div class="hud-top-row">
                $partial("src/templates/lang_toggle.html")$
                $partial("src/templates/settings_toggle.html")$
            </div>
        </div>
    </div>

    <a href="$path$/" class="site-name-link">mimi</a>

    <div class="small-screen-warning">
        <p data-en="Please play in fullscreen or increase your window size."
           data-jp="フルスクリーンで再生するか、ウィンドウサイズを大きくしてください。">Please play in fullscreen or increase your window size.</p>
    </div>

    <div id="game-root"></div>

    <div class="song-page-footer">
        <button class="btn-fullscreen" id="btn-fullscreen" title="Fullscreen">
            <svg class="icon-fullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <g class="corner corner-tl"><path d="M3 9 L3 3 L9 3"/></g>
                <g class="corner corner-tr"><path d="M15 3 L21 3 L21 9"/></g>
                <g class="corner corner-br"><path d="M21 15 L21 21 L15 21"/></g>
                <g class="corner corner-bl"><path d="M9 21 L3 21 L3 15"/></g>
            </svg>
            <svg class="icon-exit-fullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <g class="corner corner-tl"><path d="M3 9 L9 9 L9 3"/></g>
                <g class="corner corner-tr"><path d="M15 3 L15 9 L21 9"/></g>
                <g class="corner corner-br"><path d="M21 15 L15 15 L15 21"/></g>
                <g class="corner corner-bl"><path d="M9 21 L9 15 L3 15"/></g>
            </svg>
        </button>
        <a href="$path$/" class="btn-back" data-en="Back" data-jp="戻る">Back</a>
    </div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
    <script src="$path$/js/main.js"></script>

</body>

</html>
