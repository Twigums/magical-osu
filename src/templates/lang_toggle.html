<button class = "lang-toggle" id = "lang-toggle" type = "button"
        role = "switch" aria-checked = "false"
        aria-label = "Toggle language between English and Japanese">
    <span class = "lang-option lang-en active" data-lang = "en">EN</span>
    <span class = "lang-option lang-jp" data-lang = "jp" data-compact = "JA">日本語</span>
</button>
